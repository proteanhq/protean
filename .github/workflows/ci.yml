name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    name: Python ${{ matrix.python-version }} Tests

    # one place to set the PyO3 flag; every step inherits it automatically
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${{ (matrix.python-version == '3.13' || matrix.python-version == '3.14') && '1' || '' }}

    steps:
      # Service images are pulled from this org's public GHCR mirror (populated
      # by mirror-images.yml), not Docker Hub. Public GHCR packages need no auth,
      # so there is no login step and fork PRs pull them with zero secrets.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-images-${{ runner.os }}-v3

      - name: Load or pull Docker images
        run: |
          IMAGES=(
            "ghcr.io/proteanhq/mirror/postgres:16"
            "ghcr.io/proteanhq/mirror/redis:7"
            "ghcr.io/proteanhq/mirror/elasticsearch:8.7.0"
            "ghcr.io/proteanhq/mirror/message-db:1.2.6"
            "ghcr.io/proteanhq/mirror/mssql-server:2022-latest"
          )

          if [ "${{ steps.docker-cache.outputs.cache-hit }}" == "true" ]; then
            echo "Loading cached Docker images..."
            for f in /tmp/docker-images/*.tar; do
              docker load -i "$f" &
            done
            wait
          else
            echo "Pulling Docker images..."
            for img in "${IMAGES[@]}"; do
              docker pull "$img" &
            done
            wait

            echo "Saving Docker images to cache..."
            mkdir -p /tmp/docker-images
            for img in "${IMAGES[@]}"; do
              name=$(echo "$img" | tr '/:' '_')
              docker save "$img" -o "/tmp/docker-images/${name}.tar" &
            done
            wait
          fi

      - name: Configure sysctl limits
        run: |
          sudo swapoff -a
          sudo sysctl -w vm.swappiness=1
          sudo sysctl -w fs.file-max=262144
          sudo sysctl -w vm.max_map_count=262144

      - name: Start service containers
        run: |
          # Free the host ports below before binding them. Remove ALL containers
          # left over from a previous run on this (potentially reused) runner:
          # matching only our own names misses a container leaked under a
          # different name, or one still shutting down, either of which can keep
          # a port bound (e.g. the 59300 Elasticsearch transport port) and fail
          # `docker run` with "address already in use".
          leaked=$(docker ps -aq)
          if [ -n "$leaked" ]; then
            docker rm -f $leaked
          fi

          docker run -d --name postgres \
            -p 55432:5432 \
            -e POSTGRES_PASSWORD=postgres \
            ghcr.io/proteanhq/mirror/postgres:16

          docker run -d --name redis \
            -p 56379:6379 \
            ghcr.io/proteanhq/mirror/redis:7

          docker run -d --name message-db \
            -p 55433:5432 \
            ghcr.io/proteanhq/mirror/message-db:1.2.6

          docker run -d --name mssql \
            -p 51433:1433 \
            -e ACCEPT_EULA=Y \
            -e "SA_PASSWORD=Protean123!" \
            ghcr.io/proteanhq/mirror/mssql-server:2022-latest

          docker run -d --name elasticsearch \
            -p 59200:9200 \
            -p 59300:9300 \
            -e "discovery.type=single-node" \
            -e "xpack.security.enabled=false" \
            -e "ES_JAVA_OPTS=-Xms512m -Xmx512m" \
            ghcr.io/proteanhq/mirror/elasticsearch:8.7.0

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until docker exec postgres pg_isready -U postgres 2>/dev/null; do sleep 2; done'
          echo "PostgreSQL is ready!"

          echo "Waiting for Redis..."
          timeout 30 bash -c 'until docker exec redis redis-cli ping 2>/dev/null; do sleep 2; done'
          echo "Redis is ready!"

          echo "Waiting for Message DB..."
          timeout 60 bash -c 'until docker exec message-db pg_isready -U postgres 2>/dev/null; do sleep 2; done'
          echo "Message DB is ready!"

          echo "Waiting for MSSQL..."
          timeout 60 bash -c 'until docker exec mssql /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Protean123!" -Q "SELECT 1" -b -C 2>/dev/null; do sleep 2; done'
          echo "MSSQL is ready!"

          echo "Waiting for Elasticsearch..."
          timeout 120 bash -c 'until curl -s http://localhost:59200/_cluster/health | grep -q "yellow\|green"; do sleep 2; done'
          echo "Elasticsearch is ready!"

          echo "All services are ready!"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Microsoft ODBC Driver 18 and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg apt-transport-https
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc >/dev/null
          curl -sSL https://packages.microsoft.com/config/ubuntu/24.04/prod.list | sudo tee /etc/apt/sources.list.d/microsoft-prod.list >/dev/null
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Mypy Plugin Tests
        run: uv run pytest tests/ext/ -v

      - name: Tests
        run: uv run protean test -c FULL
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_PORT: 55432
          PGPASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 56379
          MSSQL_PASSWORD: Protean123!
          MSSQL_USER: sa
          MSSQL_PORT: 51433
          MSSQL_HOST: localhost

      - name: CodeCOV
        if: success() || failure()
        uses: codecov/codecov-action@v5.4.2
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Mypy (src/protean)
    # Static type gate. src/protean must pass mypy with the quarantine config in
    # pyproject.toml — a clean run is green and NEW errors outside the quarantine
    # fail CI. The quarantine shrinks per type-safety sub-issue (see ADR-0018).
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Mypy
        run: uv run mypy src/protean

  fd-hermeticity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: FD Hermeticity Gate (ulimit 1024)
    # Regression gate for #1168: the core suite must run in a single process
    # under the common 1024 open-file soft limit without leaking descriptors
    # ("OSError: Too many open files"). GitHub runners default to a high limit,
    # so we pin it to 1024 here to reproduce a fresh container / default dev box.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run core suite under a 1024 descriptor limit
        run: |
          ulimit -n 1024
          echo "open-file limits -> soft: $(ulimit -Sn), hard: $(ulimit -Hn)"
          uv run protean test

  # Publishes the docs via the GitHub Actions Pages pipeline (build the site,
  # then deploy the artifact) instead of `mkdocs gh-deploy` to the gh-pages
  # branch. The legacy branch-based Pages builder proved unreliable (builds
  # intermittently stuck/errored), freezing the live site on a stale snapshot;
  # the Actions deployment removes that GitHub-side build step entirely.
  #
  # Not gated on `test`: the rendered docs don't depend on the DB integration
  # matrix, and gating publication on a 30-min (occasionally flaky) suite means
  # a single flake strands the docs. Runs on main only.
  docs-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialize Pages deployments; never cancel one mid-publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install dependencies
        run: uv sync --group docs --no-dev

      - name: Build site
        run: uv run mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
