name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Per-PR cost control. The FULL adapter suite (`-c FULL`, which starts
        # Postgres/Redis/Elasticsearch/MSSQL/MessageDB) is the expensive part, so
        # only the newest Python runs it (check `Python 3.14 Full`); the older
        # versions run the fast in-memory CORE suite with no Docker. The
        # lowest-direct leg (`Python 3.14 Tests`) re-resolves the dependencies to
        # their floor and runs CORE, proving the floors resolve/install on the
        # newest Python without a Docker spin-up. The full `-c FULL` matrix across
        # every Python runs nightly on `main` (nightly.yml), which is where a
        # version-specific adapter regression on 3.11-3.13 is caught. See ADR-0020.
        include:
          - { python-version: "3.11", full: false, resolution: highest }
          - { python-version: "3.12", full: false, resolution: highest }
          - { python-version: "3.13", full: false, resolution: highest }
          - { python-version: "3.14", full: true, resolution: highest }
          - { python-version: "3.14", full: false, resolution: lowest-direct }
    # Check names are branch-protection contexts. The CORE legs and the
    # lowest-direct leg on 3.14 are `Python X Tests`; the FULL adapter leg is
    # `Python 3.14 Full` (add it to the required checks so it gates merges).
    name: ${{ matrix.full && 'Python 3.14 Full' || (matrix.resolution == 'lowest-direct' && 'Python 3.14 Tests') || format('Python {0} Tests', matrix.python-version) }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - uses: ./.github/actions/test-suite
        with:
          python-version: ${{ matrix.python-version }}
          full: ${{ matrix.full }}
          resolution: ${{ matrix.resolution }}
          # Enforce + upload coverage only from the FULL adapter leg (the only
          # per-PR leg that reaches the full-suite figure the threshold assumes).
          enforce-coverage: ${{ matrix.full && matrix.resolution == 'highest' }}
          upload-coverage: ${{ matrix.full && matrix.resolution == 'highest' }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  mypy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Mypy (src/protean)
    # Static type gate. src/protean must pass mypy with the quarantine config in
    # pyproject.toml — a clean run is green and NEW errors outside the quarantine
    # fail CI. The quarantine shrinks per type-safety sub-issue (see ADR-0018).
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Mypy
        run: uv run mypy src/protean

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Lint (ruff)
    # Fast, service-free quality gate. Runs the same ruff lint + format checks
    # as the pre-commit hook, but in CI where they can't be bypassed (hooks not
    # installed, `--no-verify`, web edits, bot commits). Format is verified with
    # `--check`, never applied. Uses the ruff pinned in uv.lock so CI and local
    # runs stay on the same version.
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      # Ruff only reads source files and its pyproject config; it does not import
      # protean, so the default sync (project + dev group, no adapter extras) is
      # all it needs and keeps this job fast.
      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

  # Publishes the docs via the GitHub Actions Pages pipeline (build the site,
  # then deploy the artifact) instead of `mkdocs gh-deploy` to the gh-pages
  # branch. The legacy branch-based Pages builder proved unreliable (builds
  # intermittently stuck/errored), freezing the live site on a stale snapshot;
  # the Actions deployment removes that GitHub-side build step entirely.
  #
  # Not gated on `test`: the rendered docs don't depend on the DB integration
  # matrix, and gating publication on a 30-min (occasionally flaky) suite means
  # a single flake strands the docs. Runs on main only.
  docs-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Serialize Pages deployments; never cancel one mid-publish.
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/setup-python@v7
        with:
          python-version: 3.x

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v6
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install dependencies
        run: uv sync --group docs --no-dev

      - name: Build site
        run: uv run mkdocs build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
