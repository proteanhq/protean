name: Feature Request
description: Suggest a new feature or enhancement for Protean
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Protean? We'd love to hear it. Please describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What problem does this feature solve? Describe the pain point or limitation you're experiencing.
        Example: "When I try to X, I have to do Y manually, which is error-prone because..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work. Include API sketches, code examples, or configuration changes if relevant.
      render: python
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternative approaches have you considered?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Protean does this relate to?
      multiple: true
      options:
        - Core Domain Elements (Aggregates, Entities, Value Objects)
        - Commands / Events / Handlers
        - Repositories / Persistence
        - Brokers / Messaging
        - Event Store / Event Sourcing
        - Server / Engine
        - CLI
        - Testing DSL
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references that would help us understand the request.
    validations:
      required: false
