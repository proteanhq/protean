# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Protean is a library: its `>=` floors are the *lowest* versions it supports,
    # proven by the lowest-direct CI leg (ADR-0020), not a moving "latest" target.
    # `increase-if-necessary` only raises a floor when the newest release escapes
    # the existing range (i.e. a new major poking past a `<N` cap) — it leaves the
    # floor alone while latest still satisfies `>=X,<N`, so dependabot stops
    # ratcheting floors up to newest-of-the-week and needlessly narrowing the
    # compatibility window (the behaviour `auto` produced — see #1216). Genuine
    # floor raises (a real feature/security dependency) are made by hand.
    versioning-strategy: increase-if-necessary
    labels:
      - "dependencies"
    groups:
      # Collapse every non-security version update into a single grouped PR per
      # run. A group with no "update-types" filter already covers major, minor,
      # and patch — so we deliberately omit it. Listing update-types here breaks
      # grouping for "requirement" updates (raising a >= floor in
      # [dependency-groups]); Dependabot can't classify those into a semver
      # bucket, drops them from the group, and opens one PR per package instead
      # (see #1163–#1167). Leaving patterns: "*" alone groups everything.
      all-dependencies:
        patterns:
          - "*"
      security-updates:
        patterns:
          - "*"
        applies-to: security-updates
    ignore:
      # Major bumps of these two need deliberate handling, not the weekly group.
      # NB: pin explicit version *ranges* rather than
      # `update-types: ["version-update:semver-major"]`. Dependabot can't reliably
      # classify ">=" requirement updates (deps in [dependency-groups] /
      # [project.optional-dependencies]) into a semver bucket — the same limitation
      # that broke the group's update-types filter (#1171) — so a semver-major
      # ignore silently fails to hold them (elasticsearch 8->9 slipped into #1178).
      # A `versions` range is matched directly and is not subject to that.
      #
      # mypy: hold on 2.x — 3.x majors change reveal_type() output and tighten
      # checks; adopt them in a dedicated PR (2.x adopted in #1175).
      - dependency-name: "mypy"
        versions: [">=3.0.0"]
      # elasticsearch: hold on 8.x — the 9.x client migration is tracked in #1150,
      # the adapter is pinned to the 8.x line, and CI runs against ES 8.7.
      - dependency-name: "elasticsearch"
        versions: [">=9.0.0"]

  # Keep the pinned GitHub Actions (checkout, setup-uv, codeql-action, …) current
  # so security fixes to the actions themselves land as PRs. Grouped into one PR
  # per run, mirroring the pip ecosystem above.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      all-actions:
        patterns:
          - "*"
      security-updates:
        patterns:
          - "*"
        applies-to: security-updates
